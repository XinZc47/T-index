<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T-INDEX Platform</title>
  <style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #f4f6fa; }</style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.0/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, createContext, useContext } = React;
const { AreaChart, Area, BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

const ThemeContext = createContext(null);
const useTheme = () => useContext(ThemeContext);

function makeColors(dark) {
  return dark ? {
    bg:"#0b0f1e",card:"#111827",cardDark:"#0d1221",border:"#1f2937",
    accent:"#06b6d4",success:"#10b981",warning:"#f59e0b",error:"#ef4444",info:"#3b82f6",
    purple:"#8b5cf6",text:"#f1f5f9",muted:"#94a3b8",dim:"#64748b",
    sidebar:"#080c18",topbar:"#0d1221",stripe:"#090d1a",
  } : {
    bg:"#f4f6fa",card:"#ffffff",cardDark:"#f0f2f7",border:"#e2e6ef",
    accent:"#0284c7",success:"#059669",warning:"#d97706",error:"#dc2626",info:"#2563eb",
    purple:"#7c3aed",text:"#1e293b",muted:"#475569",dim:"#94a3b8",
    sidebar:"#ffffff",topbar:"#ffffff",stripe:"#fafbfd",
  };
}

const sc = (s, C) => s === "healthy" ? C.success : s === "warning" ? C.warning : C.error;

const machines = [
  {id:"CNC-01",  status:"healthy",runtime:"12h 30m",temp:68,vib:"Normal",  energy:42,util:88},
  {id:"CNC-02",  status:"warning",runtime:"9h 15m", temp:81,vib:"Elevated",energy:67,util:72},
  {id:"CNC-03",  status:"healthy",runtime:"15h 00m",temp:65,vib:"Normal",  energy:38,util:92},
  {id:"CNC-04",  status:"healthy",runtime:"11h 45m",temp:70,vib:"Normal",  energy:45,util:85},
  {id:"Press-01",status:"error",  runtime:"—",      temp:95,vib:"Critical",energy:0, util:0 },
  {id:"Press-02",status:"healthy",runtime:"8h 00m", temp:72,vib:"Normal",  energy:55,util:79},
  {id:"Drill-01",status:"warning",runtime:"6h 20m", temp:78,vib:"Elevated",energy:31,util:65},
  {id:"Lathe-01",status:"healthy",runtime:"14h 10m",temp:66,vib:"Normal",  energy:48,util:90},
];
const trendData = [
  {t:"06:00",util:72,energy:1800},{t:"08:00",util:78,energy:2100},
  {t:"10:00",util:85,energy:2450},{t:"12:00",util:80,energy:2200},
  {t:"14:00",util:88,energy:2600},{t:"16:00",util:82,energy:2450},
  {t:"18:00",util:76,energy:2100},
];
const energyHourly = [
  {h:"00",usage:1180,bench:1200},{h:"02",usage:960,bench:990},{h:"04",usage:840,bench:880},
  {h:"06",usage:1120,bench:1050},{h:"08",usage:1820,bench:1700},{h:"10",usage:2440,bench:2200},
  {h:"12",usage:2180,bench:2100},{h:"14",usage:2610,bench:2300},{h:"16",usage:2380,bench:2200},
  {h:"18",usage:2020,bench:1900},{h:"20",usage:1580,bench:1500},{h:"22",usage:1290,bench:1200},
];
const floorMachines = [
  {id:"CNC-01",status:"healthy"},{id:"CNC-02",status:"warning"},{id:"CNC-03",status:"healthy"},{id:"CNC-04",status:"healthy"},
  {id:"Press-01",status:"error"},{id:"Press-02",status:"healthy"},{id:"Drill-01",status:"warning"},{id:"Lathe-01",status:"healthy"},
  {id:"CNC-05",status:"healthy"},{id:"CNC-06",status:"healthy"},{id:"Weld-01",status:"healthy"},{id:"Weld-02",status:"healthy"},
];
const alertsData = [
  {id:1,sev:"error",  machine:"Press-01",    msg:"Machine down — temp exceeded 95°C, immediate action required",conf:99,time:"32 min ago",tag:"Downtime"},
  {id:2,sev:"warning",machine:"CNC-02",      msg:"Abnormal vibration — inspection recommended within 8 hours",conf:87,time:"2 min ago", tag:"Predictive Maint."},
  {id:3,sev:"warning",machine:"Press-02",    msg:"Energy 18% above baseline — consider off-peak scheduling",conf:92,time:"15 min ago",tag:"Energy"},
  {id:4,sev:"info",   machine:"Drill-01",    msg:"Routine maintenance schedule expiring in 3 days",conf:100,time:"1 hr ago",  tag:"Scheduled"},
  {id:5,sev:"warning",machine:"Supply Chain",msg:"Supplier B delayed — may impact tomorrow's production",conf:78,time:"2 hr ago",  tag:"Supply Chain"},
];
const aiInsights = [
  {machine:"Press-01",risk:97,trend:"↑ Rapidly Rising",  reason:"Temp rose 27°C within 2 hours, exceeding safety threshold",action:"Shut down for immediate inspection",urgency:"error"},
  {machine:"CNC-02",  risk:73,trend:"↑ Steadily Rising", reason:"Vibration 24% above baseline — likely bearing wear",        action:"Schedule inspection within 8 hours",urgency:"warning"},
  {machine:"Drill-01",risk:45,trend:"→ Stable",           reason:"Lubricant consumption elevated, approaching maint. cycle",  action:"Add to this week's maintenance plan",urgency:"warning"},
  {machine:"CNC-05",  risk:12,trend:"↓ Improving",        reason:"Vibration normalised after bearing replacement last week",  action:"Continue monitoring",               urgency:"info"},
];
const mainNav = [
  {id:"dashboard",label:"Dashboard",    icon:"◈"},
  {id:"machines", label:"Equipment",    icon:"⚙"},
  {id:"energy",   label:"Energy Mgmt", icon:"⚡"},
  {id:"alerts",   label:"Alert Center", icon:"◉", badge:3},
  {id:"supply",   label:"Supply Chain", icon:"◇"},
  {id:"reports",  label:"Reports & ESG",icon:"▣"},
  {id:"admin",    label:"Admin",        icon:"◆"},
];

function KPICard({label,value,unit,sub,color,icon}) {
  const C = useTheme();
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",borderTop:`3px solid ${color}`,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
      <div style={{display:"flex",justifyContent:"space-between"}}>
        <div style={{fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
        <span style={{fontSize:16,color}}>{icon}</span>
      </div>
      <div style={{marginTop:6}}>
        <span style={{fontSize:26,fontWeight:700,color}}>{value}</span>
        {unit && <span style={{fontSize:12,color:C.muted,marginLeft:4}}>{unit}</span>}
      </div>
      {sub && <div style={{fontSize:10,color:C.dim,marginTop:3}}>{sub}</div>}
    </div>
  );
}
function Card({title,sub,children}) {
  const C = useTheme();
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
      {title && <div style={{marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:600,color:C.text}}>{title}</div>
        {sub && <div style={{fontSize:10,color:C.dim,marginTop:2}}>{sub}</div>}
      </div>}
      {children}
    </div>
  );
}
function FBtn({active,color,label,onClick}) {
  const C = useTheme();
  return <button onClick={onClick} style={{background:active?`${color}15`:"transparent",border:`1px solid ${active?color:C.border}`,color:active?color:C.dim,borderRadius:20,padding:"4px 14px",fontSize:11,cursor:"pointer"}}>{label}</button>;
}

function Dashboard() {
  const C = useTheme(); const [hov,setHov] = useState(null);
  const TT = {background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11,color:C.text};
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        <KPICard label="Machine Utilisation" value="82"      unit="%" sub="38 / 42 machines active"       color={C.accent}  icon="⚙"/>
        <KPICard label="Today's Downtime"    value="1h 24m"           sub="↑ +12 min vs yesterday"         color={C.warning} icon="⏱"/>
        <KPICard label="Energy Consumption"  value="2,450"   unit="kWh" sub="8% above baseline"            color={C.purple}  icon="⚡"/>
        <KPICard label="AI Alerts"           value="3"       unit="open" sub="1 requires immediate action" color={C.error}   icon="●"/>
        <KPICard label="Production Status"   value="On Track"           sub="94% progress · target met"    color={C.success} icon="✓"/>
        <KPICard label="OEE Index"           value="76.4"    unit="%" sub="↑ above industry avg 72.1%"   color={C.accent}  icon="◈"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:12}}>
        <Card title="Factory Floor Map" sub="Live status · Taoyuan Plant A">
          <div style={{display:"flex",gap:12,marginBottom:10,fontSize:10,color:C.dim}}>
            {[["Normal",C.success],["Warning",C.warning],["Down",C.error]].map(([l,c]) => (
              <span key={l} style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:2,background:c,display:"inline-block"}}/>{l}</span>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {floorMachines.map(m => (
              <div key={m.id} onMouseEnter={()=>setHov(m.id)} onMouseLeave={()=>setHov(null)}
                style={{background:hov===m.id?`${sc(m.status,C)}12`:C.cardDark,border:`1px solid ${hov===m.id?sc(m.status,C):sc(m.status,C)+"55"}`,borderRadius:6,padding:"10px 6px",textAlign:"center",transition:"all .15s"}}>
                <div style={{fontSize:9,color:C.muted,marginBottom:4}}>{m.id}</div>
                <div style={{width:8,height:8,borderRadius:"50%",background:sc(m.status,C),margin:"0 auto",boxShadow:`0 0 5px ${sc(m.status,C)}88`}}/>
              </div>
            ))}
          </div>
        </Card>
        <Card title="AI Live Recommendations" sub="Smart analysis · Confidence score">
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {alertsData.slice(0,4).map(a => (
              <div key={a.id} style={{background:C.cardDark,borderRadius:7,padding:"9px 11px",borderLeft:`3px solid ${a.sev==="error"?C.error:a.sev==="warning"?C.warning:C.info}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:10,fontWeight:700,color:a.sev==="error"?C.error:a.sev==="warning"?C.warning:C.info}}>{a.machine}</span>
                  <span style={{fontSize:9,color:C.dim}}>{a.time}</span>
                </div>
                <div style={{fontSize:10,color:C.muted,lineHeight:1.4}}>{a.msg}</div>
                <div style={{marginTop:5,display:"flex",alignItems:"center",gap:6}}>
                  <div style={{flex:1,background:C.border,borderRadius:3,height:3}}>
                    <div style={{height:"100%",borderRadius:3,background:a.sev==="error"?C.error:a.sev==="warning"?C.warning:C.info,width:`${a.conf}%`}}/>
                  </div>
                  <span style={{fontSize:9,color:C.dim}}>{a.conf}%</span>
                </div>
              </div>
            ))}
          </div>
        </Card>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Card title="Utilisation Trend" sub="Today 06:00–20:00">
          <ResponsiveContainer width="100%" height={150}>
            <AreaChart data={trendData} margin={{top:4,right:4,left:-24,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="t" tick={{fill:C.dim,fontSize:9}}/><YAxis tick={{fill:C.dim,fontSize:9}} domain={[60,95]}/>
              <Tooltip contentStyle={TT}/>
              <Area type="monotone" dataKey="util" stroke={C.accent} fill={C.accent+"22"} strokeWidth={2} name="Utilisation %"/>
            </AreaChart>
          </ResponsiveContainer>
        </Card>
        <Card title="Energy Consumption Trend" sub="kWh / time slot">
          <ResponsiveContainer width="100%" height={150}>
            <BarChart data={trendData} margin={{top:4,right:4,left:-24,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="t" tick={{fill:C.dim,fontSize:9}}/><YAxis tick={{fill:C.dim,fontSize:9}}/>
              <Tooltip contentStyle={TT}/>
              <Bar dataKey="energy" fill={C.purple} radius={[3,3,0,0]} name="Energy kWh"/>
            </BarChart>
          </ResponsiveContainer>
        </Card>
      </div>
    </div>
  );
}

function Machines() {
  const C = useTheme(); const [sel,setSel] = useState(null); const [filter,setFilter] = useState("all");
  const filtered = filter==="all"?machines:machines.filter(m=>m.status===filter);
  const selM = machines.find(m=>m.id===sel);
  const TT = {background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11,color:C.text};
  const gen = base => Array.from({length:10},(_,i)=>({t:`${i*2}h`,temp:Math.round(base+Math.sin(i*.8)*7),vib:Math.round(40+Math.sin(i*1.1)*18+i*.5)}));
  const sl = s => s==="healthy"?"Normal":s==="warning"?"Warning":"Down";
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",gap:8}}>
        {[["all","All",C.accent],["healthy","Normal",C.success],["warning","Warning",C.warning],["error","Down",C.error]].map(([id,l,c]) => (
          <FBtn key={id} active={filter===id} color={c} label={l} onClick={()=>setFilter(id)}/>
        ))}
        <span style={{marginLeft:"auto",fontSize:11,color:C.dim,alignSelf:"center"}}>Showing {filtered.length} / {machines.length} machines</span>
      </div>
      <Card>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
          <thead><tr style={{background:C.cardDark}}>
            {["Machine ID","Status","Runtime","Temp","Vibration","Energy kWh","Utilisation",""].map(h=>(
              <th key={h} style={{padding:"9px 12px",textAlign:"left",color:C.dim,fontWeight:500,fontSize:10}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {filtered.map((m,i) => (
              <tr key={m.id} onClick={()=>setSel(sel===m.id?null:m.id)} style={{borderTop:`1px solid ${C.border}`,cursor:"pointer",background:sel===m.id?`${C.accent}08`:i%2?C.stripe:"transparent"}}>
                <td style={{padding:"10px 12px",fontWeight:700,color:C.text,fontSize:12}}>{m.id}</td>
                <td style={{padding:"10px 12px"}}><span style={{background:`${sc(m.status,C)}15`,color:sc(m.status,C),borderRadius:10,padding:"2px 8px",fontSize:10}}>{sl(m.status)}</span></td>
                <td style={{padding:"10px 12px",color:C.muted}}>{m.runtime}</td>
                <td style={{padding:"10px 12px",color:m.temp>80?C.error:C.muted}}>{m.temp}°C</td>
                <td style={{padding:"10px 12px",color:m.vib==="Critical"?C.error:m.vib==="Elevated"?C.warning:C.muted}}>{m.vib}</td>
                <td style={{padding:"10px 12px",color:C.muted}}>{m.energy}</td>
                <td style={{padding:"10px 12px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:60,background:C.border,borderRadius:3,height:4}}>
                      <div style={{height:"100%",borderRadius:3,background:m.util>80?C.success:m.util>60?C.warning:C.error,width:`${m.util}%`}}/>
                    </div>
                    <span style={{color:C.muted,fontSize:10}}>{m.util}%</span>
                  </div>
                </td>
                <td style={{padding:"10px 8px",color:C.dim,fontSize:10}}>{sel===m.id?"▲":"▼"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
      {selM && (
        <Card title={`${selM.id} — Sensor Detail`} sub="Live data · Past 20 hours">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[{key:"temp",label:"Temperature (°C)",color:C.warning},{key:"vib",label:"Vibration (m/s²)",color:C.purple}].map(({key,label,color}) => (
              <div key={key}>
                <div style={{fontSize:10,color:C.dim,marginBottom:6}}>{label}</div>
                <ResponsiveContainer width="100%" height={120}>
                  <LineChart data={gen(selM.temp)} margin={{top:4,right:4,left:-24,bottom:0}}>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
                    <XAxis dataKey="t" tick={{fill:C.dim,fontSize:8}}/><YAxis tick={{fill:C.dim,fontSize:8}}/>
                    <Tooltip contentStyle={TT}/>
                    <Line type="monotone" dataKey={key} stroke={color} dot={false} strokeWidth={2} name={label}/>
                  </LineChart>
                </ResponsiveContainer>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}

function Energy() {
  const C = useTheme();
  const TT = {background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11,color:C.text};
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        <KPICard label="Total Today"      value="18,420" unit="kWh"   sub="+6% vs yesterday"          color={C.purple}  icon="⚡"/>
        <KPICard label="Peak Period"      value="14:00–16:00"          sub="avg 2,600 kWh"             color={C.warning} icon="●"/>
        <KPICard label="Anomalies"        value="2"      unit="units"  sub="Press-02 · CNC-02"         color={C.error}   icon="⚠"/>
        <KPICard label="Saving Potential" value="1,240"  unit="kWh/d" sub="with optimised scheduling"  color={C.success} icon="↓"/>
      </div>
      <Card title="Hourly Consumption vs Baseline" sub="Actual today vs benchmark (kWh)">
        <ResponsiveContainer width="100%" height={200}>
          <AreaChart data={energyHourly} margin={{top:4,right:4,left:-20,bottom:0}}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
            <XAxis dataKey="h" tick={{fill:C.dim,fontSize:9}}/><YAxis tick={{fill:C.dim,fontSize:9}}/>
            <Tooltip contentStyle={TT}/>
            <Area type="monotone" dataKey="bench" stroke={C.dim} fill={C.dim+"18"} strokeDasharray="5 3" strokeWidth={1.5} name="Baseline"/>
            <Area type="monotone" dataKey="usage" stroke={C.purple} fill={C.purple+"18"} strokeWidth={2} name="Actual"/>
          </AreaChart>
        </ResponsiveContainer>
      </Card>
      <Card title="AI Energy Saving Recommendations" sub="Based on live data and historical patterns">
        {[
          {icon:"⚡",title:"Shift to Off-Peak Hours",       desc:"Moving Machine #5 to 22:00–06:00 could save ~320 kWh/day (−12%)", saving:"320 kWh/d"},
          {icon:"⚠",title:"Press-02 Consumption Anomaly",  desc:"18% above baseline — recommend cleaning or pressure recalibration",  saving:"180 kWh/d"},
          {icon:"◌",title:"Night-Time Auto Standby",        desc:"Idle draw during 00:00–06:00 can be cut with auto power-saving mode",saving:"85 kWh/d"},
        ].map(t => (
          <div key={t.title} style={{display:"flex",gap:12,padding:"11px 12px",background:C.cardDark,borderRadius:8,marginBottom:8}}>
            <span style={{fontSize:18,color:C.accent,flexShrink:0}}>{t.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:C.text}}>{t.title}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{t.desc}</div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:10,color:C.dim}}>Savings</div>
              <div style={{fontSize:12,fontWeight:700,color:C.success}}>{t.saving}</div>
            </div>
          </div>
        ))}
      </Card>
    </div>
  );
}

function AIInsights() {
  const C = useTheme();
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        <KPICard label="High-Risk Machines" value="1"    unit="unit" sub="Press-01 needs immediate action" color={C.error}   icon="●"/>
        <KPICard label="Model Accuracy"     value="91.4" unit="%"    sub="LSTM model · past 30 days"       color={C.accent}  icon="◎"/>
        <KPICard label="Preventable Stops"  value="3/wk"             sub="est. saving NT$180K"              color={C.success} icon="↑"/>
        <KPICard label="Data Points"        value="2.4M"             sub="processed in past 24 hrs"         color={C.purple}  icon="◈"/>
      </div>
      <Card title="AI Architecture — 4 Layers" sub="From raw data to automated decisions">
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
          {[
            {layer:"L1",name:"Predictive Analytics",   model:"LSTM / ARIMA",        desc:"Demand forecasting · Inventory",  kpi:"Accuracy > 85%",    color:C.accent},
            {layer:"L2",name:"Decision Support",        model:"DMAIC Framework",     desc:"Anomaly detection · Root cause",  kpi:"Decision time −50%",color:C.purple},
            {layer:"L3",name:"Recommendation Engine",   model:"Behaviour Vectors",   desc:"Real-time remarketing · Quoting", kpi:"Manual effort −60%",color:C.warning},
            {layer:"L4",name:"Backend Intelligence",    model:"Event-Trigger Engine",desc:"Alerts · Compliance reports",     kpi:"Report ready < 5s", color:C.success},
          ].map(l => (
            <div key={l.layer} style={{background:C.cardDark,borderRadius:8,padding:"12px",borderTop:`3px solid ${l.color}`}}>
              <div style={{fontSize:10,fontWeight:700,color:l.color,marginBottom:4}}>{l.layer} · {l.name}</div>
              <div style={{fontSize:10,color:C.dim,marginBottom:4}}>{l.model}</div>
              <div style={{fontSize:10,color:C.muted}}>{l.desc}</div>
              <div style={{marginTop:8,fontSize:9,background:`${l.color}15`,color:l.color,borderRadius:4,padding:"2px 6px",display:"inline-block"}}>{l.kpi}</div>
            </div>
          ))}
        </div>
      </Card>
      <Card title="Equipment Failure Risk Assessment" sub="LSTM time-series model · Alerts at confidence > 85%">
        {aiInsights.map(ins => (
          <div key={ins.machine} style={{background:C.cardDark,borderRadius:8,padding:"13px 15px",marginBottom:10,borderLeft:`4px solid ${ins.urgency==="error"?C.error:ins.urgency==="warning"?C.warning:C.info}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div>
                <span style={{fontSize:13,fontWeight:700,color:C.text}}>{ins.machine}</span>
                <span style={{marginLeft:8,fontSize:10,color:C.dim}}>{ins.trend}</span>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:9,color:C.dim}}>Failure Risk</div>
